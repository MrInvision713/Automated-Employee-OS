<!DOCTYPE html>
<html>
<head>
    <title>Add New Employee</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>Add New Employee</h1>

    <form method="POST">
        <input name="first_name" placeholder="First Name" required><br><br>
        <input name="last_name" placeholder="Last Name" required><br><br>
        <input name="email" placeholder="Email" required><br><br>
        <input name="department" placeholder="Department" required><br><br>
        <input name="job_title" placeholder="Job Title" required><br><br>
        <input name="manager" placeholder="Manager" required><br><br>
        <input name="start_date" type="date" required><br><br>

        <label>Laptop Needed?</label>
        <select name="laptop_needed">
            <option>Yes</option>
            <option>No</option>
        </select>

        <br><br>
        <button type="submit">Start Onboarding</button>
    </form>

    <br>
    <a href="/">Back to Dashboard</a>
</body>
</html>
